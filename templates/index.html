<!DOCTYPE html>
<html>
<head>
    <title>FakeNewsGuard System</title>
    <link rel="stylesheet" href="/static/style.css?v=final">
</head>
<body>

<div class="container">

    <h1>FakeNewsGuard</h1>
    <p class="subtitle">AI-powered misinformation detection system</p>

    <textarea id="news" placeholder="Paste news here..."></textarea>

    <button onclick="predict()">Analyze News</button>

    <!-- LOADING -->
    <p id="loading" class="hidden">Analyzing... Please wait ⏳</p>

    <div id="result-box" class="hidden">
        <h2 id="result"></h2>

        <div class="progress-bar">
            <div id="progress"></div>
        </div>

        <p id="percent"></p>

        <div id="related"></div>
    </div>

</div>

<script>
function predict() {
    let text = document.getElementById("news").value;

    // VALIDATION
    if (text.trim() === "") {
        alert("Please enter news text first!");
        return;
    }

    // SHOW LOADING
    document.getElementById("loading").classList.remove("hidden");
    document.getElementById("result-box").classList.add("hidden");

    fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {

        // HIDE LOADING
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("result-box").classList.remove("hidden");

        let result = document.getElementById("result");
        let progress = document.getElementById("progress");
        let percent = document.getElementById("percent");
        let related = document.getElementById("related");

        // RESULT
        if (data.label === "fake") {
            result.innerText = "Fake News Detected";
            result.style.color = "#dc2626";
            let p = data.fake_prob * 100;
            progress.style.width = p + "%";
            percent.innerText = p.toFixed(2) + "% fake";

        } else {
            result.innerText = "Verified as Real News";
            result.style.color = "#16a34a";
            let p = (1 - data.fake_prob) * 100;
            progress.style.width = p + "%";
            percent.innerText = p.toFixed(2) + "% real";
        }

        related.innerHTML = "";

        // RELATED NEWS
        if (data.label === "fake" && data.related.length > 0) {
            related.innerHTML += "<h3>Verify from trusted sources:</h3>";

            data.related.forEach(item => {
                related.innerHTML += `
                    <div class="card">
                        <strong>${item.title}</strong>
                        <a href="${item.url}" target="_blank">View Source</a>
                    </div>
                `;
            });
        }

        // SUPPORTING LINKS (LIST FORMAT)
        if (data.links && data.links.length > 0) {
            related.innerHTML += "<h3>Supporting Evidence:</h3><ul class='link-list'>";

            data.links.forEach(link => {
                related.innerHTML += `
                    <li>
                        <a href="${link}" target="_blank">${link}</a>
                    </li>
                `;
            });

            related.innerHTML += "</ul>";
        }

    })
    .catch(error => {
        // ERROR HANDLING
        document.getElementById("loading").classList.add("hidden");
        alert("Something went wrong. Please try again.");
        console.error(error);
    });
}
</script>

</body>
</html>
