<!DOCTYPE html>
<html>
<head>
    <title>FakeNewsGuard System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

    <h1>FakeNewsGuard</h1>
    <p class="subtitle">AI-powered misinformation detection system</p>

    <textarea id="news" placeholder="Paste news here..."></textarea>

    <button onclick="predict()">Analyze News</button>

    <div id="result-box" class="hidden">
        <h2 id="result"></h2>

        <div class="progress-bar">
            <div id="progress"></div>
        </div>

        <p id="percent"></p>

        <div id="related"></div>
    </div>

</div>

<script>
function predict() {
    let text = document.getElementById("news").value;

    fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {

        document.getElementById("result-box").classList.remove("hidden");

        let result = document.getElementById("result");
        let progress = document.getElementById("progress");
        let percent = document.getElementById("percent");
        let related = document.getElementById("related");

        if (data.label === "fake") {
            result.innerText = "⚠ FAKE NEWS";
            result.style.color = "#dc2626";
            let p = data.fake_prob * 100;
            progress.style.width = p + "%";
            percent.innerText = p.toFixed(2) + "% fake";

        } else {
            result.innerText = "✔ REAL NEWS";
            result.style.color = "#16a34a";
            let p = (1 - data.fake_prob) * 100;
            progress.style.width = p + "%";
            percent.innerText = p.toFixed(2) + "% real";
        }

        related.innerHTML = "";

        // RELATED NEWS
        if (data.label === "fake" && data.related.length > 0) {
            related.innerHTML += "<h3>Verify from trusted sources:</h3>";

            data.related.forEach(item => {
                related.innerHTML += `
                    <div class="card">
                        <a href="${item.url}" target="_blank">${item.title}</a>
                    </div>
                `;
            });
        }

        // FACT CHECK LINKS
        if (data.links && data.links.length > 0) {
            related.innerHTML += "<h3>🔗 Supporting Evidence:</h3>";

            data.links.forEach(link => {
                related.innerHTML += `
                    <div class="card">
                        <a href="${link}" target="_blank">${link}</a>
                    </div>
                `;
            });
        }

    });
}
</script>

</body>
</html>
